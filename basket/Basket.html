<!DOCTYPE html>
<html lang="eng">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Happy Hardware</title>
    <link rel="stylesheet" href="basket.css">
</head>


<!-- NEEDED THE NAV BAR  -->
<body>
    <!-- Title -->
    <h1> My shopping basket </h1>
     <!-- Product -->
    <div class="the-box">
    <div class="product">
        Products in your basket
    </div>
    <!-- Quantity of the product -->
     <div class="quantity"> 
        Select Quantity:
     </div>
        <button class="quantity-button">-</button>
        <span class="quantity-number">1</span>
        <button class="quantity-button">+</button>
    </div>

        <!-- Text -->
      <input type="checkbox" id="gift" class="gift-checkbox">
      <label class="gift">Buying as a Gift? </label>
       <br>
      <input type="checkbox" id="subscribe" class="subscribe-checkbox">
      <label class="subscribe">Stay updated with our offers! Subscribe to our newsletter?</label>
      
      <br><br><br>
           <!-- Buttons for Checkout and Back -->
        <a href="/checkout" class="checkout-button"> Go to checkout</a>
        <a href="/backbutton" class="back-button"> Back to store</a>

        <!-- NEEDED THE FOORER -->
</body>
</html>
